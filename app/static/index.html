<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Assistant</title>
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-color: #1f2937;
            --panel-bg: #ffffff;
            --border-color: #e5e7eb;
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --user-msg-bg: #eff6ff;
            --bot-msg-bg: #f3f4f6;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --text-color: #f9fafb;
            --panel-bg: #1f2937;
            --border-color: #374151;
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --user-msg-bg: #1e3a8a;
            --bot-msg-bg: #374151;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 300px;
            background-color: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 10;
            box-shadow: var(--shadow);
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--panel-bg);
            box-shadow: var(--shadow);
        }

        .upload-area {
            border: 2px dashed var(--border-color);
            border-radius: 0.5rem;
            padding: 2rem 1rem;
            text-align: center;
            margin-top: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--primary-color);
            background-color: rgba(37, 99, 235, 0.05);
        }

        .upload-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
            margin-top: 1rem;
            font-weight: 500;
        }

        .upload-btn:hover { background-color: var(--primary-hover); }

        .upload-status { margin-top: 1rem; font-size: 0.875rem; }

        .doc-card {
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            padding: 0.75rem;
            border-radius: 0.375rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .doc-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            overflow: hidden;
        }
        .doc-title {
            font-size: 0.875rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .doc-meta {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .delete-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.25rem;
            padding: 0.25rem;
            border-radius: 0.25rem;
        }
        .delete-btn:hover {
            background-color: rgba(239, 68, 68, 0.1);
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem;
            border-radius: 0.5rem;
            line-height: 1.5;
        }

        .message.user {
            align-self: flex-end;
            background-color: var(--user-msg-bg);
            border-bottom-right-radius: 0;
        }

        .message.bot {
            align-self: flex-start;
            background-color: var(--bot-msg-bg);
            border-bottom-left-radius: 0;
            width: 100%;
            max-width: 90%;
        }

        .sources-container {
            margin-top: 1rem;
            border-top: 1px solid var(--border-color);
            padding-top: 1rem;
        }

        .sources-toggle {
            background: none;
            border: none;
            color: var(--primary-color);
            cursor: pointer;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0;
        }

        .sources-content {
            display: none;
            margin-top: 1rem;
            gap: 1rem;
            flex-direction: column;
        }

        .sources-content.open { display: flex; }

        .source-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 1rem;
            border-radius: 0.375rem;
            font-size: 0.875rem;
        }

        .source-title { font-weight: 600; margin-bottom: 0.5rem; color: var(--primary-color); }
        
        .chat-input-area {
            padding: 1.5rem 2rem;
            background-color: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 1rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 0.375rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 1rem;
        }

        .chat-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .send-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.375rem;
            cursor: pointer;
            font-weight: 600;
        }

        .send-btn:hover { background-color: var(--primary-hover); }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 0.5rem 1rem;
            border-radius: 0.375rem;
            cursor: pointer;
        }
        
        .loading {
            align-self: flex-start;
            color: var(--text-color);
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <h2>Document RAG</h2>
        <p style="font-size: 0.875rem; color: var(--text-color); opacity: 0.7; margin-top: 0.5rem;">
            Upload PDF, DOCX, or TXT files to add to the knowledge base.
        </p>

        <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <p>Drag & Drop files here</p>
            <p style="margin: 0.5rem 0; opacity: 0.5;">or</p>
            <input type="file" id="file-input" style="display: none" accept=".pdf,.docx,.txt">
            <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">Browse Files</button>
        </div>
        <div id="upload-status" class="upload-status"></div>

        <div style="margin-top: 2rem; display: flex; flex-direction: column; flex: 1; overflow: hidden;">
            <h3 style="font-size: 1rem; margin-bottom: 1rem;">📄 Uploaded Documents</h3>
            <div id="documents-list" style="display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; flex: 1; padding-right: 0.5rem;">
                <!-- Document cards go here -->
            </div>
        </div>
    </div>

    <div class="main-chat">
        <div class="header">
            <h2>Chat Assistant</h2>
            <button class="theme-toggle" id="theme-btn">Toggle Dark Mode</button>
        </div>

        <div class="chat-history" id="chat-history">
            <div class="message bot">
                Hello! I am your RAG Assistant. Ask me a question based on the uploaded documents.
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" class="chat-input" id="chat-input" placeholder="Ask a question..." autocomplete="off">
            <button class="send-btn" id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
    // Theme toggle
    var themeBtn = document.getElementById('theme-btn');
    themeBtn.addEventListener('click', function() {
        var currentTheme = document.body.getAttribute('data-theme');
        if (currentTheme === 'dark') {
            document.body.removeAttribute('data-theme');
        } else {
            document.body.setAttribute('data-theme', 'dark');
        }
    });

    // File Upload Logic
    var dropZone = document.getElementById('drop-zone');
    var fileInput = document.getElementById('file-input');
    var uploadStatus = document.getElementById('upload-status');

    dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', function() {
        dropZone.classList.remove('dragover');
    });

    dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        uploadStatus.innerHTML = '<span style="color: var(--primary-color); font-weight: bold;">Uploading ' + file.name + '...</span>';
        var formData = new FormData();
        formData.append('file', file);

        fetch('/api/v1/upload', {
            method: 'POST',
            body: formData
        })
        .then(function(res) {
            return res.json().then(function(data) {
                if (res.ok) {
                    uploadStatus.innerHTML = '<span style="color: green; font-weight: bold;">Success! Processed ' + data.chunks_processed + ' chunks.</span>';
                    loadDocuments();
                } else {
                    uploadStatus.innerHTML = '<span style="color: red; font-weight: bold;">Error: ' + (data.detail || 'Upload failed') + '</span>';
                }
            });
        })
        .catch(function(err) {
            uploadStatus.innerHTML = '<span style="color: red; font-weight: bold;">Connection error</span>';
        })
        .finally(function() {
            fileInput.value = ''; // Reset file input
            setTimeout(function() { uploadStatus.innerHTML = ''; }, 5000);
        });
    }

    // Document Management Logic
    function loadDocuments() {
        var docsList = document.getElementById('documents-list');
        if (!docsList) return;
        
        fetch('/api/v1/documents')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                docsList.innerHTML = '';
                if (data.documents && data.documents.length > 0) {
                    for (var i = 0; i < data.documents.length; i++) {
                        var doc = data.documents[i];
                        var card = document.createElement('div');
                        card.className = 'doc-card';
                        
                        var info = document.createElement('div');
                        info.className = 'doc-info';
                        
                        var dTitle = document.createElement('div');
                        dTitle.className = 'doc-title';
                        dTitle.textContent = doc.title;
                        dTitle.title = doc.title;
                        
                        var dMeta = document.createElement('div');
                        dMeta.className = 'doc-meta';
                        var dateStr = new Date(doc.uploaded_at).toLocaleDateString();
                        dMeta.textContent = doc.chunks + ' chunks ' + String.fromCharCode(8226) + ' ' + dateStr;
                        
                        info.appendChild(dTitle);
                        info.appendChild(dMeta);
                        
                        var delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.innerHTML = '🗑️';
                        delBtn.title = 'Delete Document';
                        delBtn.onclick = (function(title) {
                            return function() {
                                if (confirm('Delete ' + title + ' and all its chunks?')) {
                                    deleteDocument(title);
                                }
                            };
                        })(doc.title);

                        card.appendChild(info);
                        card.appendChild(delBtn);
                        docsList.appendChild(card);
                    }
                } else {
                    docsList.innerHTML = '<div style="font-size: 0.875rem; opacity: 0.7;">No documents uploaded yet.</div>';
                }
            })
            .catch(function(err) {
                console.error('Error loading documents:', err);
                docsList.innerHTML = '<div style="font-size: 0.875rem; color: red;">Error loading documents.</div>';
            });
    }

    function deleteDocument(title) {
        fetch('/api/v1/documents/' + encodeURIComponent(title), { method: 'DELETE' })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                loadDocuments();
            })
            .catch(function(err) {
                console.error('Error deleting document:', err);
                alert('Error deleting document');
            });
    }

    // Call loadDocuments on initial load
    loadDocuments();

    // Chat Logic
    var chatInput = document.getElementById('chat-input');
    var sendBtn = document.getElementById('send-btn');
    var chatHistory = document.getElementById('chat-history');

    chatInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    function sendMessage() {
        var text = chatInput.value.trim();
        if (!text) return;

        // Add User Message
        addMessage(text, 'user');
        chatInput.value = '';

        // Add Loading indicator
        var loadingId = 'loading-' + Date.now();
        var loadingHtml = '<div class="message loading" id="' + loadingId + '">Thinking...</div>';
        chatHistory.insertAdjacentHTML('beforeend', loadingHtml);
        chatHistory.scrollTop = chatHistory.scrollHeight;

        fetch('/api/v1/query', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: text, top_k: 5 })
        })
        .then(function(res) {
            return res.json().then(function(data) {
                var loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.parentNode.removeChild(loadingEl);
                
                if (res.ok) {
                    addBotMessage(data.answer, data.results);
                } else {
                    addMessage('Error: ' + (data.detail || 'Failed to get response'), 'bot');
                }
            });
        })
        .catch(function(err) {
            var loadingEl = document.getElementById(loadingId);
            if (loadingEl) loadingEl.parentNode.removeChild(loadingEl);
            addMessage('Error: Connection failed', 'bot');
        });
    }

    function addMessage(text, type) {
        var div = document.createElement('div');
        div.className = 'message ' + type;
        div.textContent = text;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    function addBotMessage(answer, sources) {
        var div = document.createElement('div');
        div.className = 'message bot';
        
        // Escape HTML in answer for safety, replace newlines with <br>
        var safeAnswer = answer.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '<br>');
        
        var html = '<div>' + safeAnswer + '</div>';
        
        if (sources && sources.length > 0) {
            var uniqueId = 'sources-' + Date.now();
            
            var sourcesHtml = '';
            for (var i = 0; i < sources.length; i++) {
                var s = sources[i];
                var score = Number(s.similarity).toFixed(2);
                var contentPreview = s.content.substring(0, 200) + '...';
                
                sourcesHtml += '<div class="source-card">' +
                    '<div class="source-title">' + s.title + ' (Score: ' + score + ')</div>' +
                    '<div>' + contentPreview + '</div>' +
                '</div>';
            }

            html += '<div class="sources-container">' +
                '<button class="sources-toggle" onclick="document.getElementById(\'' + uniqueId + '\').classList.toggle(\'open\')">' +
                    String.fromCodePoint(0x1F4DA) + ' View ' + sources.length + ' Sources Used' +
                '</button>' +
                '<div class="sources-content" id="' + uniqueId + '">' +
                    sourcesHtml +
                '</div>' +
            '</div>';
        }

        div.innerHTML = html;
        chatHistory.appendChild(div);
        chatHistory.scrollTop = chatHistory.scrollHeight;
    }
</script>

</body>
</html>
